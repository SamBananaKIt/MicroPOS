<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroPOS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        background: '#F9FAFB',
                        primary: '#0f3d2e',
                        accent: '#7ED957'
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-gray-800 font-sans antialiased min-h-screen flex flex-col items-center">
    
    <!-- Main App Container -->
    <div id="app" class="w-full max-w-md bg-white min-h-screen shadow-soft relative flex flex-col">
        
        <!-- Top Bar: Header & KPIs -->
        <header class="bg-primary text-white p-4 pb-6 rounded-b-3xl shadow-md z-10 relative">
            <div class="flex justify-between items-center mb-4">
                <h1 id="shop-name-display" class="text-xl font-bold tracking-tight">Loading...</h1>
                <button id="btn-settings" class="p-2 bg-white/10 rounded-full hover:bg-white/20 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
            
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="bg-white/10 rounded-xl p-2 backdrop-blur-sm">
                    <p class="text-xs text-white/70 mb-1">ยอดขาย(฿)</p>
                    <p id="kpi-revenue" class="text-lg font-semibold kpi-number">0</p>
                </div>
                <div class="bg-white/10 rounded-xl p-2 backdrop-blur-sm">
                    <p class="text-xs text-white/70 mb-1">จำนวน(ชิ้น)</p>
                    <p id="kpi-qty" class="text-lg font-semibold kpi-number">0</p>
                </div>
                <div class="bg-white/10 rounded-xl p-2 backdrop-blur-sm relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-tr from-orange-400 to-yellow-300 opacity-20 group-hover:opacity-30 transition-opacity"></div>
                    <p class="text-xs text-white/70 mb-1 relative z-10">Streak(วัน)</p>
                    <p id="kpi-streak" class="text-lg font-semibold text-yellow-300 flex justify-center items-center gap-1 relative z-10"><span class="text-sm">🔥</span>0</p>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto w-full px-4 py-6 pb-24 space-y-8 scroll-smooth">
            
            <!-- Mission Card -->
            <section class="bg-white border text-center border-gray-100 rounded-2xl p-6 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gray-100">
                    <div id="mission-progress-bar" class="h-full bg-accent transition-all duration-700 ease-out w-0"></div>
                </div>
                <h2 class="text-sm font-medium text-gray-500 mb-2 uppercase tracking-wide">เป้าหมายวันนี้</h2>
                <div class="flex justify-center items-baseline gap-2 mb-2">
                    <span id="mission-current" class="text-5xl font-extrabold tracking-tighter text-primary count-up">0</span>
                    <span class="text-xl text-gray-400 font-medium">/</span>
                    <span id="mission-target" class="text-xl text-gray-400 font-medium">0</span>
                </div>
                <p id="mission-message" class="text-sm text-gray-600 min-h-[1.25rem] font-medium animate-fade-in">เริ่มได้ดีแล้ว เฮีย สู้ ๆ ค่ะ 💪</p>
            </section>

            <!-- Products Section -->
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">สินค้า</h3>
                    <button id="btn-add-product" class="text-sm font-medium text-accent hover:text-green-600 transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        เพิ่มสินค้า
                    </button>
                </div>
                
                <!-- Product Grid -->
                <div id="product-grid" class="grid grid-cols-3 gap-3">
                    <!-- Products will be injected here by JS -->
                </div>
            </section>
        </main>

        <!-- Confetti Canvas -->
        <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50"></canvas>
        
        <!-- Notification Toast Container -->
        <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 items-center pointer-events-none w-full max-w-sm px-4"></div>

    </div>

    <!-- Modals to follow below in app.js injections or hidden divs -->
    <div id="modals-container"></div>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
