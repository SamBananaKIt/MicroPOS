<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F8FB">
    <title>MicroPOS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgZmlsbD0iIzBmM2QyZSIvPjx0ZXh0IHg9IjI1NiIgeT0iMzUwIiBmb250LXNpemU9IjI1MCIgZmlsbD0iI2ZmZmZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+TVA8L3RleHQ+PC9zdmc+">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- SVG Defs for Gradients -->
    <svg width="0" height="0" style="position:absolute;visibility:hidden;">
        <defs>
            <linearGradient id="hotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00B3C6" />
                <stop offset="100%" stop-color="#4C9AFF" />
            </linearGradient>
        </defs>
    </svg>

    <div id="app">

        <!-- Thin Top Bar -->
        <div class="top-bar">
            <h1 id="shop-name-display" class="shop-name">MicroPOS</h1>
            <button id="btn-settings" class="icon-btn" aria-label="Edit Mode">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </button>
        </div>

        <!-- KPI Cards Row -->
        <div class="kpi-row">
            <div class="kpi-card kpi-revenue">
                <span class="kpi-label">ยอดขาย</span>
                <span class="kpi-value" id="kpi-revenue">0</span>
                <span class="kpi-unit">฿</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">จำนวน</span>
                <span class="kpi-value" id="kpi-qty">0</span>
                <span class="kpi-unit">ชิ้น</span>
            </div>
            <div class="kpi-card kpi-streak">
                <span class="kpi-label">Streak</span>
                <span class="kpi-value" id="kpi-streak">🔥 0</span>
            </div>
        </div>

        <!-- Main Content -->
        <main class="app-main">

            <!-- Top Seller Ticker (Top Position) -->
            <div id="top-seller-ticker" class="top-ticker" style="display:none">
                <span class="ticker-icon">🏆</span>
                <span class="ticker-text" id="ticker-text">—</span>
            </div>

            <!-- Analytics Carousel -->
            <section class="analytics-card">
                <div class="carousel-container" id="analytics-carousel">
                    <div class="carousel-track">
                        <!-- Slide 1: Mission -->
                        <div class="carousel-slide">
                            <span class="slide-label">🎯 เป้าหมายวันนี้</span>
                            <div class="mission-numbers">
                                <span class="mission-current" id="mission-current">0</span>
                                <span class="mission-sep">/</span>
                                <span class="mission-target" id="mission-target">0</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="mission-progress-bar"></div>
                            </div>
                            <p id="mission-message" class="mission-msg">เริ่มได้ดีแล้ว เฮีย สู้ ๆ ค่ะ 💪</p>
                        </div>
                        <!-- Slide 2: Pie -->
                        <div class="carousel-slide">
                            <span class="slide-label">📊 สัดส่วนยอดขาย</span>
                            <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>
                        </div>
                        <!-- Slide 3: Hourly -->
                        <div class="carousel-slide">
                            <span class="slide-label">⏰ รายชั่วโมง</span>
                            <div class="chart-wrap"><canvas id="chart-hourly"></canvas></div>
                        </div>
                        <!-- Slide 4: Weekly -->
                        <div class="carousel-slide">
                            <span class="slide-label">📈 7 วันย้อนหลัง</span>
                            <div class="chart-wrap"><canvas id="chart-weekly"></canvas></div>
                        </div>
                    </div>
                </div>
                <div class="carousel-dots" id="carousel-dots">
                    <div class="carousel-dot active" data-idx="0"></div>
                    <div class="carousel-dot" data-idx="1"></div>
                    <div class="carousel-dot" data-idx="2"></div>
                    <div class="carousel-dot" data-idx="3"></div>
                </div>
            </section>

            <!-- Products -->
            <section>
                <div class="section-header">
                    <h2 class="section-title">สินค้า</h2>
                    <button id="btn-add-product" class="add-btn">+ เพิ่มใหม่</button>
                </div>
                <div id="product-grid" class="product-grid">
                    <!-- JS injects -->
                </div>
            </section>

            <!-- Live Ranking -->
            <section class="ranking-section" id="ranking-section" style="display:none">
                <div class="ranking-header">
                    <span>🔥 วันนี้ใครนำ?</span>
                </div>
                <div class="ranking-list" id="ranking-list">
                    <!-- JS injects -->
                </div>
            </section>
        </main>

        <!-- Product Modal -->
        <div id="product-modal" class="modal-overlay" style="display:none">
            <div class="modal-content">
                <h3 id="modal-title">เพิ่มสินค้าใหม่</h3>

                <div class="modal-img-upload" id="modal-img-upload">
                    <div class="img-preview" id="modal-img-preview">📷</div>
                    <span class="upload-hint">แตะเพื่อเปลี่ยนรูป</span>
                </div>
                <div id="crop-controls" style="display:none; width:100%; margin-top:-8px; margin-bottom: 8px;">
                    <div style="display:flex; justify-content:space-between; font-size:11px; color:#6B8796;">
                        <span>ย่อ</span><span>ซูม</span>
                    </div>
                    <input type="range" id="crop-zoom" min="0.1" max="3" step="0.01" value="1"
                        style="width:100%; margin:0;">
                </div>

                <div class="modal-form">
                    <label>ชื่อสินค้า</label>
                    <input type="text" id="modal-input-name" placeholder="เช่น กาแฟเย็น" autocomplete="off">

                    <div class="modal-row">
                        <div class="modal-col">
                            <label>ราคาขาย (฿)</label>
                            <input type="number" id="modal-input-price" placeholder="50" inputmode="decimal">
                        </div>
                        <div class="modal-col">
                            <label>ต้นทุน (฿)</label>
                            <input type="number" id="modal-input-cost" placeholder="25" inputmode="decimal">
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-cancel" id="btn-modal-cancel">ยกเลิก</button>
                    <button class="btn-delete" id="btn-modal-delete" style="display:none">ลบ</button>
                    <button class="btn-save" id="btn-modal-save">บันทึก</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Edit Mode Bottom Bar (hidden by default) -->
        <div id="edit-bar" class="edit-bar" style="display:none">
            <button class="btn-add" id="edit-add-product">+ เพิ่มสินค้า</button>
            <button class="btn-done" id="edit-done">✓ เสร็จสิ้น</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.error('SW registration failed', err));
            });
        }
    </script>
    <script src="./app.js"></script>
</body>

</html>
